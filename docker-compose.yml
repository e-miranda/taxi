version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '8000:8000'
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=taxi
      - DB_USERNAME=root
      - DB_PASSWORD=secret

  db:
    image: mysql:5.7
    restart: always
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: taxi

  web:
    build:
      context: ./web
    ports:
      - '3000:80'

  mobile:
    build:
      context: ./mobile
    ports:
      - '19006:19006'
