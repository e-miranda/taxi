version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: taxi_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: taxi_db
      MYSQL_USER: taxi_user
      MYSQL_PASSWORD: taxi_pass
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - taxi

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taxi_api
    restart: always
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: mysql
      DB_DATABASE: taxi_db
      DB_USERNAME: taxi_user
      DB_PASSWORD: taxi_pass
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
    depends_on:
      - mysql
    networks:
      - taxi

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: taxi_web
    restart: always
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_HOST: mysql
      DB_DATABASE: taxi_db
      DB_USERNAME: taxi_user
      DB_PASSWORD: taxi_pass
    ports:
      - '80:80'
    volumes:
      - ./web:/app
    depends_on:
      - mysql
    networks:
      - taxi

volumes:
  mysql_data:

networks:
  taxi:
    driver: bridge
